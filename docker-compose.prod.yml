services:
  backend:
    build:
      context: ./backend
      target: prod
    container_name: kakutausa-backend-prod
    restart: always
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      # These should be set in the production environment or via a .env file
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8081
      # ... other production env vars

  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: kakutausa-frontend-prod
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - backend
